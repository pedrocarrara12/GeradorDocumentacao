spring:
  application:
    name: doctech-ai

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5433/doctech_ai}
    username: ${DB_USERNAME:doctech_user}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
