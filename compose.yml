services:
  postgres:
    image: postgres:17-alpine
    container_name: doctech-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - doctech-ai-postgres-data:/var/lib/postgresql/data

volumes:
  doctech-ai-postgres-data: